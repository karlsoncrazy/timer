<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dungeon &amp; Heroes — Годовщина</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;600&family=EB+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0704;
    --char:#1a110a;
    --ember:#ff7a2e;
    --ember-hot:#ffb347;
    --blood:#7a1810;
    --gold:#c9a15a;
    --ash:#8c8074;
    --bone:#f3e8d6;
  }

  *{box-sizing:border-box;}
  html,body{
    height:100%;
    margin:0;
    overflow:hidden;
    background:var(--void);
    font-family:'EB Garamond', serif;
  }

  .stage{
    height:100dvh;
    width:100vw;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- ART PANEL ---------- */
  .art-panel{
    position:relative;
    flex:0 0 32dvh;
    overflow:hidden;
    background:
      radial-gradient(120% 100% at 50% 50%, rgba(122,24,16,0.28), transparent 65%),
      var(--void);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .art-img{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center center;
    display:block;
    filter:saturate(1.05) contrast(1.05);
  }
  .art-overlay{
    position:absolute;
    inset:0;
    background:
      linear-gradient(to bottom, rgba(10,7,4,0) 62%, rgba(10,7,4,0.95) 100%),
      linear-gradient(to right, rgba(10,7,4,0.1) 0%, rgba(10,7,4,0.35) 100%);
    pointer-events:none;
  }
  .art-vignette{
    position:absolute;
    inset:0;
    box-shadow: inset 0 0 8vw 2vw rgba(0,0,0,0.55);
    pointer-events:none;
  }

  /* jagged molten crack — horizontal (mobile) */
  .crack-h{
    position:absolute;
    left:0; right:0;
    bottom:-1px;
    height:16px;
    background:linear-gradient(90deg, var(--blood), var(--ember) 35%, var(--ember-hot) 50%, var(--ember) 65%, var(--blood));
    box-shadow:0 0 18px 3px rgba(255,122,46,0.65), 0 0 40px 8px rgba(255,122,46,0.25);
    clip-path:polygon(
      0% 100%, 0% 55%, 4% 80%, 8% 30%, 13% 70%, 18% 15%, 23% 60%,
      28% 25%, 33% 75%, 38% 10%, 43% 55%, 48% 20%, 53% 65%,
      58% 30%, 63% 78%, 68% 15%, 73% 60%, 78% 25%, 83% 70%,
      88% 20%, 93% 58%, 97% 12%, 100% 45%, 100% 100%
    );
    animation:crackGlow 3.2s ease-in-out infinite;
  }

  @keyframes crackGlow{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.35); }
  }

  /* ---------- CONTENT PANEL ---------- */
  .content-panel{
    flex:1;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:3.2dvh 5vw 3dvh;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(122,24,16,0.35), transparent 60%),
      radial-gradient(90% 70% at 50% 100%, rgba(255,122,46,0.10), transparent 70%),
      var(--char);
    text-align:center;
    overflow:hidden;
  }

  .embers{ position:absolute; inset:0; pointer-events:none; }
  .embers span{
    position:absolute;
    bottom:-10px;
    width:3px; height:3px;
    border-radius:50%;
    background:var(--ember-hot);
    box-shadow:0 0 6px 2px rgba(255,179,71,0.85);
    opacity:0;
    animation:rise 6.5s linear infinite;
  }
  .embers span:nth-child(1){ left:8%; animation-delay:0s; }
  .embers span:nth-child(2){ left:20%; animation-delay:1.1s; width:2px; height:2px;}
  .embers span:nth-child(3){ left:33%; animation-delay:2.3s; }
  .embers span:nth-child(4){ left:47%; animation-delay:0.6s; width:2px; height:2px;}
  .embers span:nth-child(5){ left:61%; animation-delay:3.1s; }
  .embers span:nth-child(6){ left:74%; animation-delay:1.8s; width:2px; height:2px;}
  .embers span:nth-child(7){ left:86%; animation-delay:4s; }
  .embers span:nth-child(8){ left:93%; animation-delay:2.6s; width:2px; height:2px;}

  @keyframes rise{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:1; }
    90%{ opacity:0.6; }
    100%{ transform:translateY(-60dvh) translateX(12px); opacity:0; }
  }

  .eyebrow{
    margin:0;
    font-family:'Cinzel', serif;
    font-weight:600;
    letter-spacing:0.42em;
    font-size:clamp(0.62rem, 1.6vw, 0.85rem);
    color:var(--gold);
    text-transform:uppercase;
    position:relative;
    z-index:2;
  }
  .eyebrow .amp{ color:var(--ember); }

  .headline{
    font-family:'Cinzel Decorative', serif;
    font-weight:700;
    color:var(--bone);
    text-transform:uppercase;
    line-height:1.08;
    margin:1.4dvh 0 2.4dvh;
    font-size:clamp(1.5rem, 4.6vw, 2.6rem);
    text-shadow:0 0 24px rgba(255,122,46,0.35), 0 2px 0 rgba(0,0,0,0.6);
    position:relative;
    z-index:2;
    max-width:16ch;
  }
  .headline em{
    font-style:normal;
    color:var(--ember-hot);
  }

  .countdown{
    display:flex;
    align-items:flex-start;
    justify-content:center;
    gap:clamp(0.5rem, 2vw, 1.6rem);
    position:relative;
    z-index:2;
  }
  .unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:2.2em;
  }
  .num{
    font-family:'Cinzel Decorative', serif;
    font-weight:900;
    font-size:clamp(1.9rem, 7.2vw, 3.6rem);
    line-height:1;
    color:var(--bone);
    background:linear-gradient(180deg, var(--bone) 30%, var(--ember-hot) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 14px rgba(255,122,46,0.55));
    font-variant-numeric:tabular-nums;
  }
  .label{
    margin-top:0.5dvh;
    font-family:'Cinzel', serif;
    font-size:clamp(0.55rem, 1.5vw, 0.72rem);
    letter-spacing:0.18em;
    color:var(--ash);
    text-transform:uppercase;
  }
  .sep{
    font-family:'Cinzel Decorative', serif;
    font-weight:700;
    font-size:clamp(1.4rem, 5vw, 2.6rem);
    color:var(--blood);
    line-height:1;
    align-self:flex-start;
    margin-top:-0.08em;
  }

  .caption{
    margin:2.6dvh 0 0;
    font-style:italic;
    color:var(--ash);
    font-size:clamp(0.75rem, 2vw, 0.95rem);
    letter-spacing:0.02em;
    position:relative;
    z-index:2;
  }
  .caption strong{
    color:var(--gold);
    font-weight:600;
    font-style:normal;
  }

  /* ---------- DESKTOP LAYOUT ---------- */
  @media (min-width:900px){
    .stage{ flex-direction:row; }
    .art-panel{ flex:0 0 44%; height:100%; }
    .art-overlay{
      background:
        linear-gradient(to right, rgba(10,7,4,0) 62%, rgba(10,7,4,0.98) 100%),
        linear-gradient(to bottom, rgba(10,7,4,0.08) 0%, rgba(10,7,4,0.3) 100%);
    }
    .crack-h{ display:none; }
    .crack-v{
      display:block;
      position:absolute;
      top:0; bottom:0;
      left:44%;
      width:16px;
      transform:translateX(-8px);
      background:linear-gradient(180deg, var(--blood), var(--ember) 35%, var(--ember-hot) 50%, var(--ember) 65%, var(--blood));
      box-shadow:0 0 18px 3px rgba(255,122,46,0.65), 0 0 40px 8px rgba(255,122,46,0.25);
      clip-path:polygon(
        100% 0%, 55% 0%, 80% 4%, 30% 8%, 70% 13%, 15% 18%, 60% 23%,
        25% 28%, 75% 33%, 10% 38%, 55% 43%, 20% 48%, 65% 53%,
        30% 58%, 78% 63%, 15% 68%, 60% 73%, 25% 78%, 70% 83%,
        20% 88%, 58% 93%, 12% 97%, 45% 100%, 100% 100%
      );
      z-index:3;
      animation:crackGlow 3.2s ease-in-out infinite;
    }
    .content-panel{ flex:1; padding:0 4vw; }
    .headline{ max-width:20ch; }
  }
  @media (max-width:899px){
    .crack-v{ display:none; }
  }

  @media (prefers-reduced-motion:reduce){
    .crack-h, .crack-v{ animation:none; }
    .embers span{ animation:none; opacity:0; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="art-panel">
    <img class="art-img" src="images.jpg" alt="Дракон из мира Dungeon &amp; Heroes">
    <div class="art-overlay"></div>
    <div class="art-vignette"></div>
    <div class="crack-h"></div>
  </div>

  <div class="crack-v"></div>

  <div class="content-panel">
    <div class="embers" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>

    <p class="eyebrow">Dungeon <span class="amp">&amp;</span> Heroes</p>
    <h1 class="headline">Пробуждение<br><em>близко</em></h1>

    <div class="countdown" id="countdown">
      <div class="unit"><span class="num" id="days">00</span><span class="label">дней</span></div>
      <div class="sep">:</div>
      <div class="unit"><span class="num" id="hours">00</span><span class="label">часов</span></div>
      <div class="sep">:</div>
      <div class="unit"><span class="num" id="mins">00</span><span class="label">минут</span></div>
      <div class="sep">:</div>
      <div class="unit"><span class="num" id="secs">00</span><span class="label">секунд</span></div>
    </div>

    <p class="caption">До годовщины <strong>Dungeon &amp; Heroes</strong> · 21 августа 2026</p>
  </div>
</div>

<script>
  var target = new Date('2026-08-21T00:00:00');

  var elDays = document.getElementById('days');
  var elHours = document.getElementById('hours');
  var elMins = document.getElementById('mins');
  var elSecs = document.getElementById('secs');
  var headline = document.querySelector('.headline');
  var caption = document.querySelector('.caption');

  function pad(n){ return String(n).padStart(2,'0'); }

  function tick(){
    var now = new Date();
    var diff = target - now;

    if(diff <= 0){
      elDays.textContent = '00';
      elHours.textContent = '00';
      elMins.textContent = '00';
      elSecs.textContent = '00';
      headline.innerHTML = 'Легенда<br><em>празднует</em>';
      caption.innerHTML = '<strong>Dungeon &amp; Heroes</strong> · с годовщиной!';
      return;
    }

    var s = Math.floor(diff / 1000);
    var days = Math.floor(s / 86400);
    var hours = Math.floor((s % 86400) / 3600);
    var mins = Math.floor((s % 3600) / 60);
    var secs = s % 60;

    elDays.textContent = pad(days);
    elHours.textContent = pad(hours);
    elMins.textContent = pad(mins);
    elSecs.textContent = pad(secs);
  }

  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
